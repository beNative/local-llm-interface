<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A local-first interface for chatting with LLMs through Ollama, LMStudio, OpenAI, and Google Gemini — with agentic tool use, project management, and RAG." />
    <title>Local LLM Interface</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style>
      html {
        font-size: 80%; /* Preserve layout density while text sizes use absolute values */
      }

      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f3f4f6;
        --bg-tertiary: #e5e7eb;
        --bg-sidebar: #f9fafb;
        --bg-hover: #eff6ff;
        --bg-backdrop: rgba(255, 255, 255, 0.6);

        --text-primary: #111827;
        --text-secondary: #374151;
        --text-muted: #6b7280;
        
        --border-primary: #e5e7eb;
        --border-secondary: #d1d5db;
        --border-focus: #3b82f6;

        /* Accent Colors per View */
        --accent-chat: #3b82f6;
        --accent-projects: #10b981;
        --accent-api: #8b5cf6;
        --accent-settings: #f59e0b;
        --accent-info: #06b6d4;

        --text-on-accent: #ffffff;
        --bg-accent-hover-scale: 0.95;

        --code-bg: #f9fafb;
        --code-output-bg: #f3f4f6;
        
        --border-radius: 0.5rem; /* 8px - more professional/square */

        /* Chat Appearance Variables */
        --chat-bg-color: var(--bg-primary);
        --user-message-bg-color: var(--accent-chat);
        --user-message-text-color: var(--text-on-accent);
        --user-message-bg-image: none;
        --assistant-message-bg-color: var(--bg-secondary);
        --assistant-message-text-color: var(--text-primary);
        --chat-font-family: 'Inter', system-ui, sans-serif;
        /* Typography Scale */
        --font-size-xs: 11px;
        --font-size-sm: 13px;
        --font-size-base: 14px;
        --font-size-lg: 16px;
        --font-size-xl: 18px;
        --font-size-2xl: 22px;

        --chat-font-size: var(--font-size-base);
        --space-1: 0.25rem;  /* 4px */
        --space-2: 0.5rem;   /* 8px */
        --space-3: 0.75rem;  /* 12px */
        --space-4: 1rem;     /* 16px */
        --space-6: 1.5rem;   /* 24px */
      }
      html.dark {
        --bg-primary: #1e1e1e;
        --bg-secondary: #252526;
        --bg-tertiary: #2d2d2d;
        --bg-sidebar: #111111;
        --bg-hover: #2a2d2e;
        --bg-backdrop: rgba(0, 0, 0, 0.7);

        --text-primary: #cccccc;
        --text-secondary: #999999;
        --text-muted: #717171;
        
        --border-primary: #333333;
        --border-secondary: #454545;
        --border-focus: #007acc;

        /* Accent Colors per View */
        --accent-chat: #007acc;
        --accent-projects: #4ec9b0;
        --accent-api: #c586c0;
        --accent-settings: #ce9178;
        --accent-info: #569cd6;

        --text-on-accent: #ffffff;
        --bg-accent-hover-scale: 1.05;

        --code-bg: #1e1e1e;
        --code-output-bg: #111111;

        /* Chat Appearance Overrides for Dark Mode */
        --user-message-bg-image: none;
        --user-message-bg-color: #007acc;
        --user-message-text-color: #ffffff;
        --assistant-message-bg-color: #2d2d2d;
      }
      /* Improve dark mode readability for all markdown content */
      html.dark .prose {
        --tw-prose-body: #cbd5e1; /* slate-300 */
        --tw-prose-headings: #f8fafc; /* slate-50 */
        --tw-prose-lead: #94a3b8; /* slate-400 */
        --tw-prose-links: #c084fc; /* purple-400 */
        --tw-prose-bold: #f1f5f9; /* slate-100 */
        --tw-prose-counters: #94a3b8; /* slate-400 */
        --tw-prose-bullets: #64748b; /* slate-500 */
        --tw-prose-hr: #475569; /* slate-600 */
        --tw-prose-quotes: #e2e8f0; /* slate-200 */
        --tw-prose-quote-borders: #475569; /* slate-600 */
        --tw-prose-captions: #94a3b8; /* slate-400 */
        --tw-prose-code: #e2e8f0; /* slate-200 */
        --tw-prose-th-borders: #475569; /* slate-600 */
        --tw-prose-td-borders: #334155; /* slate-700 */
      }
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-size: var(--font-size-base);
        -webkit-font-smoothing: subpixel-antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      body, button, input, select, textarea {
        font-family: 'Segoe UI Variable Text', 'Segoe UI', 'Segoe UI Symbol', system-ui, sans-serif;
      }
      button, input, select, textarea {
        font-size: inherit;
      }
      .text-xs {
        font-size: var(--font-size-xs) !important;
        line-height: 1.4;
      }
      .text-sm {
        font-size: var(--font-size-sm) !important;
        line-height: 1.45;
      }
      .text-base {
        font-size: var(--font-size-base) !important;
        line-height: 1.5;
      }
      .text-lg {
        font-size: var(--font-size-lg) !important;
        line-height: 1.5;
      }
      .text-xl {
        font-size: var(--font-size-xl) !important;
        line-height: 1.5;
      }
      .text-2xl {
        font-size: var(--font-size-2xl) !important;
        line-height: 1.4;
      }
      /* Custom Scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: var(--border-secondary);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: var(--text-muted);
      }
      /* Global Transitions */
      button, a, input, select, textarea {
        transition: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }

      /* Density Overrides */
      html[data-density="compact"] {
        --font-size-xs: 10px;
        --font-size-sm: 12px;
        --font-size-base: 13px;
        --font-size-lg: 15px;
        --font-size-xl: 17px;
        --font-size-2xl: 20px;
        --space-1: 0.125rem; /* 2px */
        --space-2: 0.25rem;  /* 4px */
        --space-3: 0.5rem;   /* 8px */
        --space-4: 0.75rem;  /* 12px */
        --space-6: 1rem;     /* 16px */
        --border-radius: 0.25rem; /* 4px */
      }

      html[data-density="comfortable"] {
        --font-size-xs: 12px;
        --font-size-sm: 14px;
        --font-size-base: 16px;
        --font-size-lg: 18px;
        --font-size-xl: 21px;
        --font-size-2xl: 26px;
        --space-1: 0.375rem; /* 6px */
        --space-2: 0.75rem;  /* 12px */
        --space-3: 1.25rem;  /* 20px */
        --space-4: 1.5rem;   /* 24px */
        --space-6: 2.25rem;  /* 36px */
        --border-radius: 0.75rem; /* 12px */
      }

      /* Tailwind Class Overrides for Density */
      html[data-density="compact"] .p-4, html[data-density="compact"] .p-\[var\(--space-4\)\] { padding: var(--space-3) !important; }
      html[data-density="compact"] .p-6, html[data-density="compact"] .p-\[var\(--space-6\)\] { padding: var(--space-4) !important; }
      html[data-density="compact"] .px-4 { padding-left: var(--space-3) !important; padding-right: var(--space-3) !important; }
      html[data-density="compact"] .py-4 { padding-top: var(--space-3) !important; padding-bottom: var(--space-3) !important; }
      html[data-density="compact"] .gap-4 { gap: var(--space-2) !important; }
      html[data-density="compact"] .gap-6 { gap: var(--space-3) !important; }
      html[data-density="compact"] .mb-8 { margin-bottom: var(--space-4) !important; }
      html[data-density="compact"] .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: var(--space-2) !important; }
      html[data-density="compact"] .rounded-2xl { border-radius: var(--border-radius) !important; }
      html[data-density="compact"] .rounded-xl { border-radius: var(--border-radius) !important; }
      
      html[data-density="comfortable"] .p-4, html[data-density="comfortable"] .p-\[var\(--space-4\)\] { padding: var(--space-6) !important; }
      html[data-density="comfortable"] .gap-4 { gap: var(--space-6) !important; }

      /* Animation for density switch */
      html {
        transition: font-size 0.2s ease;
      }
      * {
        transition: padding 0.2s ease, margin 0.2s ease, gap 0.2s ease, border-radius 0.2s ease;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "http": "https://esm.sh/http@^0.0.1-security",

    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "react/": "https://esm.sh/react@^19.1.1/",

    "electron": "https://esm.sh/electron@^37.2.6",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.1",
    "react-syntax-highlighter/": "https://esm.sh/react-syntax-highlighter@^15.6.1/",
    "react-syntax-highlighter": "https://esm.sh/react-syntax-highlighter@^15.6.1",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "child_process": "https://esm.sh/child_process@^1.0.2",
    "crypto": "https://esm.sh/crypto@^1.0.1",
    "pyodide/": "https://esm.sh/pyodide@^0.28.1/",
    "diff-match-patch": "https://esm.sh/diff-match-patch@^1.0.5",

    "@heroicons/react/": "https://aistudiocdn.com/@heroicons/react@^2.2.0/",

    "react-feather": "https://esm.sh/react-feather@^2.0.10",

  }
}
</script>
</head>
  <body class="subpixel-antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

</html>
