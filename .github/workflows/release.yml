name: Automated Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate tag and gather metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      notes: ${{ steps.changelog.outputs.notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "::group::Version validation"
          echo "Tag name: ${TAG_NAME}"
          echo "package.json version: ${PACKAGE_VERSION}"
          if [[ "${TAG_NAME}" != "v${PACKAGE_VERSION}" ]]; then
            echo "::error::Tag name (${TAG_NAME}) does not match package.json version (${PACKAGE_VERSION})."
            exit 1
          fi
          if ! grep -q "## \[${PACKAGE_VERSION}\]" CHANGELOG.md; then
            echo "::error::Changelog entry for version ${PACKAGE_VERSION} not found."
            exit 1
          fi
          # Detect pre-release versions (e.g., 0.22.0-rc.1, 0.22.0-beta.1)
          IS_PRERELEASE="false"
          if [[ "${PACKAGE_VERSION}" == *"-"* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "Version validation succeeded. Pre-release: ${IS_PRERELEASE}"
          echo "::endgroup::"
          {
            echo "version=${PACKAGE_VERSION}"
            echo "tag=${TAG_NAME}"
            echo "is_prerelease=${IS_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "::group::Extracting changelog for ${VERSION}"
          awk -v ver="${VERSION}" '
            BEGIN { capture=0 }
            /^## \[/ {
              if (capture) { exit }
              if ($0 ~ "\\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "::error::Failed to locate changelog notes for version ${VERSION}."
            exit 1
          fi
          sed -i '1{/^$/d;}' release-notes.md
          echo "Changelog entry:" && cat release-notes.md
          echo "::endgroup::"
          {
            echo "notes<<EOF"
            cat release-notes.md
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-latest
            build-args: --mac --x64
            electron-cache: ~/Library/Caches/electron
            electron-builder-cache: ~/Library/Caches/electron-builder
            npm-target-arch: x64
          - name: Windows x64
            os: windows-latest
            build-args: --win --x64
            electron-cache: 'C:\\Users\\runneradmin\\AppData\\Local\\electron\\Cache'
            electron-builder-cache: 'C:\\Users\\runneradmin\\AppData\\Local\\electron-builder\\Cache'
            npm-target-arch: x64
          - name: Windows ia32
            os: windows-latest
            build-args: --win --ia32
            electron-cache: 'C:\\Users\\runneradmin\\AppData\\Local\\electron\\Cache'
            electron-builder-cache: 'C:\\Users\\runneradmin\\AppData\\Local\\electron-builder\\Cache'
            npm-target-arch: ia32
          - name: Linux x64
            os: ubuntu-latest
            build-args: --linux AppImage --x64
            electron-cache: ~/.cache/electron
            electron-builder-cache: ~/.cache/electron-builder
            npm-target-arch: x64
          - name: Linux arm64
            os: ubuntu-latest
            build-args: --linux AppImage --arm64
            electron-cache: ~/.cache/electron
            electron-builder-cache: ~/.cache/electron-builder
            npm-target-arch: arm64
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_CACHE: ${{ matrix.electron-cache }}
      ELECTRON_BUILDER_CACHE: ${{ matrix.electron-builder-cache }}
      npm_config_target_arch: ${{ matrix.npm-target-arch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.electron-cache }}
            ${{ matrix.electron-builder-cache }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build and publish release artifacts
        run: npm run build && npx electron-builder ${{ matrix.build-args }} --publish always

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release

      - name: Update GitHub release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Local LLM Interface ${{ env.TAG }}
          body_path: release/release-notes.md
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          # Don't upload files here — electron-builder already attached them
          # in the build step via --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
